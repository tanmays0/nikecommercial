<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop ARCHIVE Air Max. Explore the full collection of men's and women's sneakers.">
  <meta name="theme-color" content="#181510">
  <title>Shop All — ARCHIVE</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="mask-icon" href="favicon.svg" color="#181510">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-inner">

  <a class="skip-link" href="#main-content">Skip to content</a>

  <div id="site-header-mount"></div>

  <main id="main-content">

    <div class="page-hero">
      <div class="container">
        <p class="eyebrow">The Archive</p>
        <h1 class="page-hero__title">Shop All</h1>
        <p class="page-hero__lead">
          The full archive of authenticated vintage and pre-loved pieces. Every listing
          is a single, hand-graded unit — sourced, inspected, and photographed as-is.
        </p>
        <div class="shop-categories" id="shop-categories" role="tablist" aria-label="Shop categories"></div>
        <p class="shop-result-count" id="shop-result-count" aria-live="polite"></p>
      </div>
    </div>

    <div class="container shop-layout">

      <aside class="shop-sidebar" aria-label="Product filters">
        <button class="shop-filters-toggle" id="shop-filter-toggle" type="button" aria-expanded="false" aria-controls="shop-filters">
          Filter &amp; Sort
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </button>

        <div class="shop-filters" id="shop-filters">
          <div class="shop-filters__group">
            <h2 class="shop-filters__group-title">Size</h2>
            <div class="shop-filters__options">
              <label class="shop-filters__option"><input type="checkbox" name="size" value="7"> 7</label>
              <label class="shop-filters__option"><input type="checkbox" name="size" value="8"> 8</label>
              <label class="shop-filters__option"><input type="checkbox" name="size" value="9"> 9</label>
              <label class="shop-filters__option"><input type="checkbox" name="size" value="10"> 10</label>
              <label class="shop-filters__option"><input type="checkbox" name="size" value="11"> 11</label>
              <label class="shop-filters__option"><input type="checkbox" name="size" value="12"> 12</label>
            </div>
          </div>

          <div class="shop-filters__group">
            <h2 class="shop-filters__group-title">Color</h2>
            <div class="shop-filters__options">
              <label class="shop-filters__option"><input type="checkbox" name="color" value="black"> Black</label>
              <label class="shop-filters__option"><input type="checkbox" name="color" value="white"> White</label>
              <label class="shop-filters__option"><input type="checkbox" name="color" value="red"> Red</label>
              <label class="shop-filters__option"><input type="checkbox" name="color" value="multi"> Multi</label>
            </div>
          </div>

          <div class="shop-filters__group">
            <h2 class="shop-filters__group-title">Price</h2>
            <div class="shop-filters__options">
              <label class="shop-filters__option"><input type="checkbox" name="price" value="under-150"> Under $150</label>
              <label class="shop-filters__option"><input type="checkbox" name="price" value="150-200"> $150 – $200</label>
              <label class="shop-filters__option"><input type="checkbox" name="price" value="over-200"> Over $200</label>
            </div>
          </div>
        </div>
      </aside>

      <div class="shop-grid" id="shop-grid" role="list"></div>
    </div>

  </main>

  <div id="site-footer-mount"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="js/site-config.js"></script>
  <script src="js/lib/dom.js"></script>
  <script src="js/lib/format.js"></script>
  <script src="js/lib/validation.js"></script>
  <script src="js/auth-engine.js"></script>
  <script src="js/wishlist-engine.js"></script>
  <script src="js/cart-engine.js"></script>
  <script src="js/cart-ui.js"></script>
  <script src="js/cart-drawer.js"></script>
  <script src="js/seo.js"></script>
  <script src="js/site-shell.js"></script>
  <script src="js/product-schema.js"></script>
  <script src="js/products-catalog.generated.js"></script>
  <script src="js/product-images.js"></script>
  <script src="js/product-card.js"></script>
  <script src="js/products-data.js"></script>
  <script src="js/mock-service.js"></script>
  <script src="js/pricing.js"></script>
  <script src="js/lib/cart-render.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/motion.js"></script>
  <script src="js/shop-render.js"></script>
  <script src="js/quick-view.js"></script>

</body>
</html>
