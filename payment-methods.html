<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Payments">
  <meta name="theme-color" content="#181510">
  <title>Payment Methods</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="mask-icon" href="favicon.svg" color="#181510">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-inner" data-account="payment-methods">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div id="site-header-mount"></div>
  <main id="main-content">
    <div class="container account-page">
      <a href="profile.html" class="account-page__back">← Back to account</a>
      <h1 class="account-page__title">Payment Methods</h1>
      <p class="account-page__lead">Saved cards for faster checkout. Card numbers are masked and never stored in full (simulated).</p>
      <div id="payment-list" class="payment-list"></div>
      <button type="button" class="btn btn--pill btn--outline" id="payment-add-btn">Add Card</button>
      <form id="payment-form" class="account-form" hidden novalidate>
        <div class="checkout-grid">
          <label class="form-field form-field--wide"><span>Name on Card</span><input name="name" required></label>
          <label class="form-field form-field--wide"><span>Card Number</span><input name="number" inputmode="numeric" placeholder="1234 5678 9012 3456" maxlength="19" required><small class="form-field__error" data-error-for="number"></small></label>
          <label class="form-field"><span>Expiry (MM/YY)</span><input name="expiry" placeholder="MM/YY" maxlength="5" required><small class="form-field__error" data-error-for="expiry"></small></label>
          <label class="form-field"><span>CVC</span><input name="cvc" inputmode="numeric" maxlength="4" required></label>
        </div>
        <div class="checkout-panel__actions">
          <button type="submit" class="btn btn--pill">Save Card</button>
          <button type="button" class="btn btn--pill btn--outline" id="payment-cancel-btn">Cancel</button>
        </div>
      </form>
    </div>
  </main>
  <div id="site-footer-mount"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="js/site-config.js"></script>
  <script src="js/lib/dom.js"></script>
  <script src="js/lib/format.js"></script>
  <script src="js/lib/validation.js"></script>
  <script src="js/auth-engine.js"></script>
  <script src="js/wishlist-engine.js"></script>
  <script src="js/cart-engine.js"></script>
  <script src="js/cart-ui.js"></script>
  <script src="js/cart-drawer.js"></script>
  <script src="js/seo.js"></script>
  <script src="js/site-shell.js"></script>
  <script src="js/coupon-engine.js"></script>
  <script src="js/account-store.js"></script>
  <script src="js/order-engine.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/motion.js"></script>
  <script src="js/account-page.js"></script>

</body>
</html>
