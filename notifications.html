<body class="page-inner" data-account="notifications">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div id="site-header-mount"></div>
  <main id="main-content">
    <div class="container account-page">
      <a href="profile.html" class="account-page__back">← Back to account</a>
      <h1 class="account-page__title">Notifications</h1>
      <p class="account-page__lead">Email and push preferences.</p>
      <form id="notifications-form" class="account-form notifications-form">
        <label class="toggle-row"><span><strong>Promotions</strong><small>Sales, drops, and offers</small></span><input type="checkbox" name="emailPromotions"></label>
        <label class="toggle-row"><span><strong>Order updates</strong><small>Confirmations and shipping</small></span><input type="checkbox" name="emailOrders"></label>
        <label class="toggle-row"><span><strong>Product drops</strong><small>Push alerts for launches</small></span><input type="checkbox" name="pushDrops"></label>
        <label class="toggle-row"><span><strong>SMS shipping</strong><small>Text me delivery updates</small></span><input type="checkbox" name="smsShipping"></label>
        <p class="form-message" id="notifications-message" role="status" hidden></p>
        <button type="submit" class="btn btn--pill">Save Preferences</button>
      </form>
    </div>
  </main>
  <div id="site-footer-mount"></div>
