<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Profile">
  <meta name="theme-color" content="#181510">
  <title>Profile</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="mask-icon" href="favicon.svg" color="#181510">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-inner" data-account="profile">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div id="site-header-mount"></div>
  <main id="main-content">
    <div class="container account-layout">
      <aside class="account-sidebar">
        <div class="account-sidebar__user">
          <p class="account-sidebar__name" id="profile-name"></p>
          <p class="account-sidebar__email" id="profile-email"></p>
        </div>
        <nav class="account-nav" aria-label="Account">
          <a href="profile.html" aria-current="page">Profile</a>
          <a href="orders.html">Orders</a>
          <a href="addresses.html">Addresses</a>
          <a href="payment-methods.html">Payment Methods</a>
          <a href="wishlist.html">Wishlist</a>
          <a href="notifications.html">Notifications</a>
          <a href="settings.html">Settings</a>
          <button type="button" class="account-nav__logout" id="logout-btn">Sign Out</button>
        </nav>
      </aside>
      <div class="account-main">
        <h1 class="account-page__title">Profile</h1>
        <form id="profile-form" class="account-form" novalidate>
          <label class="form-field"><span>Name</span><input name="name" required><small class="form-field__error" data-error-for="name"></small></label>
          <label class="form-field"><span>Email</span><input type="email" name="email" disabled></label>
          <p class="form-message" id="profile-message" role="status" hidden></p>
          <button type="submit" class="btn btn--pill">Save Changes</button>
        </form>
      </div>
    </div>
  </main>
  <div id="site-footer-mount"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="js/site-config.js"></script>
  <script src="js/lib/dom.js"></script>
  <script src="js/lib/format.js"></script>
  <script src="js/lib/validation.js"></script>
  <script src="js/auth-engine.js"></script>
  <script src="js/wishlist-engine.js"></script>
  <script src="js/cart-engine.js"></script>
  <script src="js/cart-ui.js"></script>
  <script src="js/cart-drawer.js"></script>
  <script src="js/seo.js"></script>
  <script src="js/site-shell.js"></script>
  <script src="js/coupon-engine.js"></script>
  <script src="js/account-store.js"></script>
  <script src="js/order-engine.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/motion.js"></script>
  <script src="js/account-page.js"></script>

</body>
</html>
