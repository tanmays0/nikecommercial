<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop ARCHIVE Kids' shoes, apparel, and essentials.">
  <meta name="theme-color" content="#181510">
  <title>Shop Kids' — ARCHIVE</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="mask-icon" href="favicon.svg" color="#181510">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-inner" data-shop-category="kids">

  <a class="skip-link" href="#main-content">Skip to content</a>

  <div id="site-header-mount"></div>

  <main id="main-content">

    <div class="page-hero">
      <div class="container">
        <p class="eyebrow">Collection</p>
        <h1 class="page-hero__title" id="shop-hero-title">SHOP KIDS'</h1>
        <p class="page-hero__lead" id="shop-hero-lead">
          Playground-proof shoes and easy layers sized for growing athletes.
        </p>
        <nav class="shop-categories" id="shop-category-nav" aria-label="Shop by category"></nav>
        <p class="shop-result-count" id="shop-result-count" aria-live="polite"></p>
      </div>
    </div>

    <div class="container shop-layout">

      <aside class="shop-sidebar" aria-label="Product filters">
        <button class="shop-filters-toggle" id="shop-filter-toggle" type="button" aria-expanded="false" aria-controls="shop-filters">
          Filter &amp; Sort
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="shop-filters" id="shop-filters"></div>
      </aside>

      <div class="shop-main">
        <div class="shop-grid" id="shop-grid" role="list"></div>
        <div id="shop-empty" class="shop-empty" hidden>
          <p>No products match your filters.</p>
          <button type="button" class="btn btn--pill btn--outline" id="shop-reset-filters">Clear Filters</button>
        </div>
      </div>

    </div>

  </main>

  <div id="site-footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="js/site-config.js"></script>
  <script src="js/lib/dom.js"></script>
  <script src="js/lib/format.js"></script>
  <script src="js/lib/validation.js"></script>
  <script src="js/auth-engine.js"></script>
  <script src="js/wishlist-engine.js"></script>
  <script src="js/cart-engine.js"></script>
  <script src="js/cart-ui.js"></script>
  <script src="js/cart-drawer.js"></script>
  <script src="js/seo.js"></script>
  <script src="js/site-shell.js"></script>
  <script src="js/product-schema.js"></script>
  <script src="js/products-catalog.generated.js"></script>
  <script src="js/product-images.js"></script>
  <script src="js/product-card.js"></script>
  <script src="js/products-data.js"></script>
  <script src="js/mock-service.js"></script>
  <script src="js/pricing.js"></script>
  <script src="js/lib/cart-render.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/motion.js"></script>
  <script src="js/shop-renderer.js"></script>
  <script src="js/quick-view.js"></script>

</body>
</html>
