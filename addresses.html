<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Addresses">
  <meta name="theme-color" content="#181510">
  <title>Addresses</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="mask-icon" href="favicon.svg" color="#181510">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-inner" data-account="addresses">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div id="site-header-mount"></div>
  <main id="main-content">
    <div class="container account-page">
      <a href="profile.html" class="account-page__back">← Back to account</a>
      <h1 class="account-page__title">Addresses</h1>
      <p class="account-page__lead">Manage shipping addresses.</p>
      <div id="addresses-list" class="address-list"></div>
      <button type="button" class="btn btn--pill btn--outline" id="address-add-btn">Add Address</button>
      <form id="address-form" class="account-form address-form" hidden novalidate>
        <input type="hidden" name="id">
        <div class="checkout-grid">
          <label class="form-field"><span>Full Name</span><input name="name" required></label>
          <label class="form-field form-field--wide"><span>Address</span><input name="line1" required></label>
          <label class="form-field"><span>City</span><input name="city" required></label>
          <label class="form-field"><span>State</span><input name="state" required></label>
          <label class="form-field"><span>ZIP</span><input name="zip" required></label>
          <label class="form-field"><span>Country</span><input name="country" value="USA" required></label>
        </div>
        <label class="form-check"><input type="checkbox" name="isDefault"> Set as default</label>
        <div class="checkout-panel__actions">
          <button type="submit" class="btn btn--pill">Save Address</button>
          <button type="button" class="btn btn--pill btn--outline" id="address-cancel-btn">Cancel</button>
        </div>
      </form>
    </div>
  </main>
  <div id="site-footer-mount"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="js/site-config.js"></script>
  <script src="js/lib/dom.js"></script>
  <script src="js/lib/format.js"></script>
  <script src="js/lib/validation.js"></script>
  <script src="js/auth-engine.js"></script>
  <script src="js/wishlist-engine.js"></script>
  <script src="js/cart-engine.js"></script>
  <script src="js/cart-ui.js"></script>
  <script src="js/cart-drawer.js"></script>
  <script src="js/seo.js"></script>
  <script src="js/site-shell.js"></script>
  <script src="js/coupon-engine.js"></script>
  <script src="js/account-store.js"></script>
  <script src="js/order-engine.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/motion.js"></script>
  <script src="js/account-page.js"></script>

</body>
</html>
