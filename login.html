<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="theme-color" content="#181510">
  <title>Sign In</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="mask-icon" href="favicon.svg" color="#181510">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">

<body class="page-inner" data-account="login">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div id="site-header-mount"></div>
  <main id="main-content">
    <div class="container account-page account-page--auth">
      <h1 class="account-page__title">Sign In</h1>
      <p class="account-page__lead">Use <strong>demo@archive.market</strong> / <strong>Archive1</strong> to explore, or create an account.</p>
      <form id="account-form" class="account-form" novalidate>
        <label class="form-field"><span>Email</span><input type="email" name="email" autocomplete="email" required><small class="form-field__error" data-error-for="email"></small></label>
        <label class="form-field"><span>Password</span><input type="password" name="password" autocomplete="current-password" required><small class="form-field__error" data-error-for="password"></small></label>
        <p class="form-message" id="account-message" role="alert" hidden></p>
        <button type="submit" class="btn btn--pill">Sign In</button>
      </form>
      <p class="account-page__links"><a href="register.html">Create account</a> · <a href="forgot-password.html">Forgot password?</a></p>
    </div>
  </main>
  <div id="site-footer-mount"></div>

  <script src="js/seo.js"></script>
  <script src="js/site-shell.js"></script>
  <script src="js/coupon-engine.js"></script>
  <script src="js/account-store.js"></script>
  <script src="js/order-engine.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/motion.js"></script>
  <script src="js/account-page.js"></script>

</body>
</html>
