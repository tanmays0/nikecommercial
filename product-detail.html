<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nike product details.">
  <meta name="theme-color" content="#0b0b0b">
  <title>Product — Nike</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Archivo+Narrow:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-inner">

  <a class="skip-link" href="#main-content">Skip to content</a>

  <header class="site-header" id="site-header">
    <a href="index.html" class="site-header__logo" aria-label="Nike Home">
      <svg viewBox="0 0 69 32" fill="currentColor" aria-hidden="true">
        <path d="M68.56 4L18.4 25.36Q12.16 28 7.92 28q-4.8 0-6.96-3.36-1.36-2.16-.8-5.48t2.96-7.08q2-3.04 6.56-8-1.6 2.56-2.24 4.96-.88 3.52.56 5.6 1.36 2.08 4.48 2.08 2.24 0 5.04-1.08L68.56 4z"/>
      </svg>
    </a>
    <nav class="site-header__nav" id="site-nav" aria-label="Main navigation">
      <a href="shop.html">New</a>
      <a href="index.html#best-of">Air Max</a>
      <a href="index.html#featured">Featured</a>
      <a href="shop.html">Shop</a>
    </nav>
    <a href="cart.html" class="site-header__cart" id="cart-badge" aria-label="Shopping bag, empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span class="site-header__cart-count" id="cart-count" hidden>0</span>
    </a>
    <button class="site-header__menu" id="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
      <span></span><span></span>
    </button>
  </header>

  <main id="main-content">

    <div id="product-not-found" class="product-not-found" hidden>
      <div class="product-not-found__inner">
        <p class="eyebrow">404</p>
        <h1 class="product-not-found__title">PRODUCT NOT FOUND</h1>
        <p class="product-not-found__lead">This item may have sold out or the link is no longer valid.</p>
        <a href="shop.html" class="btn btn--pill">Continue Shopping</a>
      </div>
    </div>

    <article class="product-detail" id="product-detail-content" hidden>
      <div class="product-detail__gallery" id="product-gallery" aria-label="Product images"></div>

      <div class="product-detail__panel">
        <p class="product-detail__category" id="product-category"></p>
        <h1 class="product-detail__title" id="product-title"></h1>
        <p class="product-detail__price" id="product-price"></p>
        <p class="product-detail__desc" id="product-desc"></p>

        <div class="size-selector">
          <span class="size-selector__label" id="size-label">Select Size</span>
          <div class="size-selector__grid" id="size-grid" role="group" aria-labelledby="size-label"></div>
        </div>

        <div class="color-selector">
          <span class="color-selector__label" id="color-label">Select Color</span>
          <div class="color-selector__grid" id="color-grid" role="group" aria-labelledby="color-label"></div>
        </div>

        <div class="product-detail__cta">
          <button type="button" class="btn btn--pill" id="add-to-bag">Add to Bag</button>
        </div>

        <div class="product-detail__meta">
          <p>Free standard shipping on orders over $50.</p>
          <p>Free returns within 60 days for members.</p>
        </div>
      </div>
    </article>

  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <div class="site-footer__bottom">
        <p>&copy; 2026 Nike, Inc. All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="js/products-data.js"></script>
  <script src="js/cart-engine.js"></script>
  <script src="js/cart-ui.js"></script>
  <script src="js/cart-drawer.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/product-detail-render.js"></script>

</body>
</html>
