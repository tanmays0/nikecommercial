<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your ARCHIVE shopping bag.">
  <meta name="theme-color" content="#181510">
  <title>Bag — ARCHIVE</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="mask-icon" href="favicon.svg" color="#181510">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-inner">

  <a class="skip-link" href="#main-content">Skip to content</a>

  <div id="site-header-mount"></div>

  <main id="main-content">
    <div class="page-hero">
      <div class="container">
        <p class="eyebrow">Checkout</p>
        <h1 class="page-hero__title">YOUR BAG</h1>
        <p class="page-hero__lead" id="cart-summary">Review your items before checkout.</p>
      </div>
    </div>

    <div class="container cart-page">
      <div id="cart-empty" class="cart-empty" hidden>
        <p>Your bag is empty.</p>
        <a href="shop.html" class="btn btn--pill">Continue Shopping</a>
      </div>
      <div class="cart-layout" id="cart-layout" hidden>
        <ul id="cart-items" class="cart-items" aria-label="Bag items"></ul>
        <aside class="cart-summary-panel" id="cart-footer" aria-label="Order summary">
          <h2 class="cart-summary-panel__title">Order Summary</h2>
          <p class="cart-shipping-progress" id="cart-shipping-progress"></p>
          <dl class="cart-summary-panel__rows" id="cart-summary-rows"></dl>
          <div class="cart-summary-panel__total">
            <span>Estimated Total</span>
            <span id="cart-total">$0</span>
          </div>
          <button type="button" class="btn btn--pill cart-footer__checkout">Checkout</button>
          <a href="shop.html" class="cart-footer__continue">Continue Shopping</a>
        </aside>
      </div>
    </div>
  </main>

  <div id="site-footer-mount"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="js/site-config.js"></script>
  <script src="js/lib/dom.js"></script>
  <script src="js/lib/format.js"></script>
  <script src="js/lib/validation.js"></script>
  <script src="js/auth-engine.js"></script>
  <script src="js/wishlist-engine.js"></script>
  <script src="js/cart-engine.js"></script>
  <script src="js/cart-ui.js"></script>
  <script src="js/cart-drawer.js"></script>
  <script src="js/seo.js"></script>
  <script src="js/site-shell.js"></script>
  <script src="js/product-schema.js"></script>
  <script src="js/products-catalog.generated.js"></script>
  <script src="js/product-images.js"></script>
  <script src="js/product-card.js"></script>
  <script src="js/products-data.js"></script>
  <script src="js/mock-service.js"></script>
  <script src="js/pricing.js"></script>
  <script src="js/lib/cart-render.js"></script>
  <script src="js/coupon-engine.js"></script>
  <script src="js/account-store.js"></script>
  <script src="js/order-engine.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/motion.js"></script>
  <script src="js/cart-page.js"></script>

</body>
</html>
