<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your Nike shopping bag.">
  <meta name="theme-color" content="#0b0b0b">
  <title>Bag — Nike</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Archivo+Narrow:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-inner">

  <a class="skip-link" href="#main-content">Skip to content</a>

  <header class="site-header is-light" id="site-header">
    <a href="index.html" class="site-header__logo" aria-label="Nike Home">
      <svg viewBox="0 0 69 32" fill="currentColor" aria-hidden="true">
        <path d="M68.56 4L18.4 25.36Q12.16 28 7.92 28q-4.8 0-6.96-3.36-1.36-2.16-.8-5.48t2.96-7.08q2-3.04 6.56-8-1.6 2.56-2.24 4.96-.88 3.52.56 5.6 1.36 2.08 4.48 2.08 2.24 0 5.04-1.08L68.56 4z"/>
      </svg>
    </a>
    <nav class="site-header__nav" id="site-nav" aria-label="Main navigation">
      <a href="shop.html">New</a>
      <a href="index.html#best-of">Air Max</a>
      <a href="index.html#featured">Featured</a>
      <a href="shop.html">Shop</a>
    </nav>
    <a href="cart.html" class="site-header__cart" id="cart-badge" aria-label="Shopping bag">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span class="site-header__cart-count" id="cart-count" hidden>0</span>
    </a>
    <button class="site-header__menu" id="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
      <span></span><span></span>
    </button>
  </header>

  <main id="main-content">
    <div class="page-hero">
      <div class="container">
        <p class="eyebrow">Checkout</p>
        <h1 class="page-hero__title">YOUR BAG</h1>
        <p class="page-hero__lead" id="cart-summary">Review your items before checkout.</p>
      </div>
    </div>

    <div class="container cart-page">
      <div id="cart-empty" class="cart-empty" hidden>
        <p>Your bag is empty.</p>
        <a href="shop.html" class="btn btn--pill">Continue Shopping</a>
      </div>
      <ul id="cart-items" class="cart-items" aria-label="Bag items"></ul>
      <div id="cart-footer" class="cart-footer" hidden>
        <div class="cart-footer__total">
          <span>Total</span>
          <span id="cart-total">$0</span>
        </div>
        <button type="button" class="btn btn--pill cart-footer__checkout">Checkout</button>
        <a href="shop.html" class="cart-footer__continue">Continue Shopping</a>
      </div>
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <div class="site-footer__bottom">
        <p>&copy; 2026 Nike, Inc. All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="js/products-data.js"></script>
  <script src="js/cart-engine.js"></script>
  <script src="js/cart-ui.js"></script>
  <script src="js/cart-drawer.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/cart-page.js"></script>

</body>
</html>
